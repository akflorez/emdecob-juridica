services:
  db:
    image: postgres:17-alpine
    container_name: emdecob-db
    restart: always
    environment:
      - POSTGRES_USER=${DB_USER:-emdecob}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-emdecob2026}
      - POSTGRES_DB=${DB_NAME:-juricob}
    volumes:
      - juricob_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  backend:
    build:
      context: .
      dockerfile: ./backend/Dockerfile
    container_name: emdecob-backend
    restart: always
    environment:
      - DATABASE_URL=postgresql://${DB_USER:-emdecob}:${DB_PASSWORD:-emdecob2026}@db:5432/${DB_NAME:-juricob}
      - NEON_URL=${NEON_URL} # Keep temporarily for migration
    depends_on:
      - db

  frontend:
    build:
      context: .
      dockerfile: ./frontend/Dockerfile
    container_name: emdecob-frontend
    restart: always
    ports:
      - "8081:80"
    depends_on:
      - backend

networks:
  default:
    name: emdecob-network

volumes:
  juricob_data:
